<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoLive | DevOps Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>⚡ CryptoLive Dashboard</h1>
            <div class="badge-container">
                <span class="badge deployment">Deployment: <strong id="dep-status">Production</strong></span>
                <span class="badge pipeline">CI/CD: <strong style="color: #2ecc71;">Jenkins Verified</strong></span>
            </div>
        </header>

        <main class="grid-layout">
            <div class="card bitcoin">
                <h3>Bitcoin (BTC)</h3>
                <p class="price" id="btc-price">$0.00</p>
                <span class="change positive" id="btc-change">+0.0%</span>
            </div>
            
            <div class="card ethereum">
                <h3>Ethereum (ETH)</h3>
                <p class="price" id="eth-price">$0.00</p>
                <span class="change negative" id="eth-change">-0.0%</span>
            </div>

            <div class="chart-card">
                <h3>Live Price Trend (Real-time API)</h3>
                <canvas id="cryptoChart"></canvas>
            </div>
        </main>
    </div>

    <script>
        // Fetch Live Data from Real API (CoinGecko)
        async function fetchPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                
                // Update BTC
                document.getElementById('btc-price').innerText = `$${data.bitcoin.usd.toLocaleString()}`;
                const btcChange = data.bitcoin.usd_24h_change.toFixed(2);
                document.getElementById('btc-change').innerText = `${btcChange}%`;
                document.getElementById('btc-change').className = `change ${btcChange >= 0 ? 'positive' : 'negative'}`;

                // Update ETH
                document.getElementById('eth-price').innerText = `$${data.ethereum.usd.toLocaleString()}`;
                const ethChange = data.ethereum.usd_24h_change.toFixed(2);
                document.getElementById('eth-change').innerText = `${ethChange}%`;
                document.getElementById('eth-change').className = `change ${ethChange >= 0 ? 'positive' : 'negative'}`;
            } catch (error) {
                console.error("API Fetch Error", error);
            }
        }

        // Initialize Simple Chart.js
        const ctx = document.getElementById('cryptoChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['10s ago', '8s ago', '6s ago', '4s ago', '2s ago', 'Now'],
                datasets: [{
                    label: 'BTC Market Pace',
                    data: [62100, 62150, 62080, 62210, 62300, 62450],
                    borderColor: '#f1c40f',
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        fetchPrices();
        setInterval(fetchPrices, 10000); // Refresh every 10s
    </script>
</body>
</html>
